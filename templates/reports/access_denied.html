{% extends "base.html" %}


{% block title %}
Access Denied

{% block content %}

    <div class="card text-center p-5">

            </i>

        </div>


        <h2 class="fw-bold text-danger">

            Access Denied

        <p class="text-muted mt-3">

        </p>


        <div class="mt-4">


            <a

            </a>


        </div>


    </div>


</div>
