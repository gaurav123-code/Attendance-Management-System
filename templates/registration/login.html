<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-card{
            width:380px;
            background:white;
            padding:35px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#0d6efd;
            color:white;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0b5ed7;
        }

        .errorlist{
            color:red;
            margin-bottom:15px;
            list-style:none;
        }
    </style>
</head>
<body>

<div class="login-card">

    <h2>Employee Login</h2>

    {% if form.errors %}
        <ul class="errorlist">
            <li>Invalid username or password.</li>
        </ul>
    {% endif %}

    <form method="post">

        {% csrf_token %}

        <label>Username</label>
        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required
        >

        <label>Password</label>
        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
