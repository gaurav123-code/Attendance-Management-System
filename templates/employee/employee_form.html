<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>{{ title }}</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f7fa;
            padding:30px;
        }

        .container{
            max-width:850px;
            margin:auto;
        }

        .card{
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        h1{
            margin-bottom:25px;
            color:#222;
        }

        .info-box{
            background:#e8f4ff;
            border-left:5px solid #0d6efd;
            padding:15px;
            margin-bottom:25px;
            border-radius:5px;
        }

        .info-box strong{
            color:#0d6efd;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        input:focus,
        select:focus{
            outline:none;
            border-color:#0d6efd;
        }

        .errorlist{
            color:red;
            margin-top:5px;
            list-style:none;
            font-size:14px;
        }

        .buttons{
            margin-top:25px;
        }

        .btn{
            display:inline-block;
            padding:10px 18px;
            border:none;
            border-radius:6px;
            text-decoration:none;
            color:white;
            cursor:pointer;
            font-weight:bold;
        }

        .btn-primary{
            background:#0d6efd;
        }

        .btn-secondary{
            background:#6c757d;
            margin-left:10px;
        }

        .required{
            color:red;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>{{ title }}</h1>

        <div class="info-box">

            <strong>Note:</strong>

            Employee ID, Username and Password are generated automatically.

            After employee creation, login credentials will be available to the administrator.

        </div>

        <form method="POST">

            {% csrf_token %}

            {% for field in form %}

            <div class="form-group">

                <label>

                    {{ field.label }}

                    {% if field.field.required %}
                        <span class="required">*</span>
                    {% endif %}

                </label>

                {{ field }}

                {{ field.errors }}

            </div>

            {% endfor %}

            <div class="buttons">

                <button
                    type="submit"
                    class="btn btn-primary">

                    Save Employee

                </button>

                <a
                    href="{% url 'employee_list' %}"
                    class="btn btn-secondary">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
