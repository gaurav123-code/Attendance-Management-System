{% extends "base.html" %}

{% block content %}

<div class="container-fluid mt-4">


    <div class="d-flex justify-content-between align-items-center mb-4">


        <div>

            <h2 class="fw-bold">

                Mark Attendance

            </h2>


            <p class="text-muted mb-0">

                Manually create attendance record for an employee.

            </p>


        </div>



        <a href="{% url 'attendance_list' %}" class="btn btn-outline-primary rounded-pill px-4">


            <i class="bi bi-arrow-left me-2"></i>

            Back to Attendance


        </a>


    </div>







    <div class="row justify-content-center">


        <div class="col-lg-7">



            <div class="card shadow-sm border-0 rounded-4">


                <div class="card-body p-5">





                    {% if messages %}


                    {% for message in messages %}


                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">


                        {{ message }}


                        <button type="button" class="btn-close" data-bs-dismiss="alert">

                        </button>


                    </div>


                    {% endfor %}


                    {% endif %}







                    <form method="POST">


                        {% csrf_token %}










                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                Employee
                            </label>

                            <select name="employee" class="form-select" required>

                                <option value="">
                                    Select Employee
                                </option>


                                {% for employee in employees %}

                                <option value="{{ employee.id }}">

                                    {{ employee.first_name }}
                                    {{ employee.last_name }}
                                    -
                                    {{ employee.employee_id }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>


                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                Check In
                            </label>

                            <input type="time" name="check_in" class="form-control">

                        </div>



                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                Check Out
                            </label>

                            <input type="time" name="check_out" class="form-control">

                        </div>



                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                Status
                            </label>


                            <select name="status" class="form-select">


                                {% for value,label in status_choices %}

                                <option value="{{ value }}">

                                    {{ label }}

                                </option>

                                {% endfor %}


                            </select>

                        </div>



                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                Remarks
                            </label>


                            <textarea name="remarks" class="form-control" rows="3"></textarea>

                        </div>


                    





                </div>











                <div class="d-flex gap-3 mt-4">



                    <button type="submit" class="btn btn-primary rounded-pill px-4">


                        <i class="bi bi-check-circle me-2"></i>


                        Save Attendance



                    </button>





                    <a href="{% url 'attendance_list' %}" class="btn btn-light rounded-pill px-4">


                        Cancel


                    </a>



                </div>





                </form>





            </div>


        </div>


    </div>


</div>



</div>


{% endblock %}
