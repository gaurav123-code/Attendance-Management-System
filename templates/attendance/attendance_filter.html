{% extends "base.html" %}

{% block content %}

<div class="container-fluid mt-4">


    <div class="d-flex justify-content-between align-items-center mb-4">


        <div>


            <h2 class="fw-bold">

                Attendance Filter

            </h2>


            <p class="text-muted mb-0">

                Filter attendance records according to your requirement.

            </p>


        </div>




        <a href="{% url 'attendance_list' %}"

           class="btn btn-outline-primary rounded-pill px-4">


            <i class="bi bi-list-check me-2"></i>

            View Records


        </a>


    </div>








    <div class="card shadow-sm border-0 rounded-4">


        <div class="card-body p-4">



            <form method="GET">


                <div class="row g-3">





                    <div class="col-md-4">


                        <label class="form-label fw-semibold">

                            Employee

                        </label>



                        <select name="employee"

                                class="form-select">



                            <option value="">

                                All Employees

                            </option>




                            {% for employee in employees %}



                            <option value="{{ employee.id }}"

                            {% if request.GET.employee == employee.id|stringformat:"s" %}

                            selected

                            {% endif %}

                            >


                                {{ employee.first_name }}

                                {{ employee.last_name }}

                                ({{ employee.employee_id }})



                            </option>



                            {% endfor %}




                        </select>


                    </div>








                    <div class="col-md-4">


                        <label class="form-label fw-semibold">

                            From Date

                        </label>



                        <input

                            type="date"

                            name="from_date"

                            class="form-control"

                            value="{{ request.GET.from_date }}"

                        >



                    </div>








                    <div class="col-md-4">


                        <label class="form-label fw-semibold">

                            To Date

                        </label>



                        <input

                            type="date"

                            name="to_date"

                            class="form-control"

                            value="{{ request.GET.to_date }}"

                        >



                    </div>









                    <div class="col-md-4">


                        <label class="form-label fw-semibold">

                            Status

                        </label>



                        <select name="status"

                                class="form-select">



                            <option value="">

                                All Status

                            </option>





                            {% for value,label in status_choices %}




                            <option value="{{ value }}"

                            {% if request.GET.status == value %}

                            selected

                            {% endif %}

                            >


                                {{ label }}



                            </option>





                            {% endfor %}





                        </select>


                    </div>









                    <div class="col-md-4">


                        <label class="form-label fw-semibold">

                            Department

                        </label>



                        <select name="department"

                                class="form-select">



                            <option value="">

                                All Departments

                            </option>





                            {% for department in departments %}




                            <option value="{{ department.id }}"

                            {% if request.GET.department == department.id|stringformat:"s" %}

                            selected

                            {% endif %}

                            >


                                {{ department.name }}



                            </option>





                            {% endfor %}





                        </select>


                    </div>








                    <div class="col-md-4 d-flex align-items-end">



                        <button

                            type="submit"

                            class="btn btn-primary w-100 rounded-pill">


                            <i class="bi bi-search me-2"></i>


                            Apply Filter



                        </button>



                    </div>






                </div>



            </form>




        </div>


    </div>






</div>


{% endblock %}
